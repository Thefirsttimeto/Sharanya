<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>Sharanya.exe 🌺</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Nunito:wght@400;600;700;800&family=Bebas+Neue&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0F0F15;
    --terminal-bg: #1A1A24;
    --terminal-border: #3A3A4F;
    --header-bg: #252535;
    --pink: #A8739A;
    --pink-dark: #6B4F6B;
    --pink-light: #4A4A5F;
    --peach: #8B7355;
    --mint: #6B9B8B;
    --lavender: #7B6FA8;
    --yellow: #9B8B5F;
    --text: #E8E8F0;
    --text-muted: #A8A8B8;
    --prompt-color: #A8739A;
    --output-color: #D8D8E8;
    --error-color: #9B6B7B;
    --success-color: #7B9B8B;
    --cursor-color: #A8739A;
    --dot-red: #8B5F6B;
    --dot-yellow: #8B7B5F;
    --dot-green: #6B8B7B;
  }

  html, body {
    height: 100%;
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }
  
  input, button {
    -webkit-user-select: text;
    user-select: text;
    -webkit-tap-highlight-color: transparent;
  }

  /* === BACKGROUND DECO === */
  body::before {
    content: '🌸 ✨ 🌷 💖 ⭐ 🍓 🌸 ✨ 💕 🌺 ⭐ 🦋 🌸 💫 🍑 🌷 ✨ 💖 🌸 ⭐ 🌸 ✨ 🌷 💖 ⭐ 🍓 🌸 ✨ 💕 🌺 ⭐ 🦋 🌸 💫 🍑 🌷 ✨ 💖 🌸 ⭐ 🌸 ✨ 🌷 💖 ⭐ 🍓 🌸 ✨ 💕 🌺 ⭐ 🦋 🌸 💫 🍑 🌷 ✨ 💖 🌸 ⭐ 🌸 ✨ 🌷 💖 ⭐ 🍓 🌸 ✨ 💕 🌺 ⭐ 🦋 🌸 💫 🍑 🌷 ✨ 💖 🌸 ⭐';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    font-size: 2.4rem;
    letter-spacing: 2.2rem;
    line-height: 3.2rem;
    color: rgba(168, 115, 154, 0.25);
    word-break: break-all;
    pointer-events: none;
    z-index: 0;
    padding: 1rem;
    white-space: pre-wrap;
    overflow: hidden;
    width: 100%;
    height: 100%;
    animation: float-bg 20s ease-in-out infinite;
  }

  @keyframes float-bg {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 0.35; }
  }

  /* === SECONDARY BACKGROUND LAYER === */
  body::after {
    content: '✨ 🌷 🍓 💖 🌺 ⭐ 🦋 💫 🍑 🌸 ✨ 🌷 💖 ⭐ 🌸 ✨ 💕 🌺 🦋 🌸 💫 ✨ 🌷 💖 ⭐ 🍓 🌸 ✨ 💕 🌺 ⭐ 🦋 🌸 💫 🍑 🌷 ✨ 💖 🌸 ⭐ ✨ 🌷 💖 ⭐ 🍓 🌸 ✨ 💕 🌺 ⭐ 🦋 🌸 💫 🍑 🌷 ✨ 💖 🌸 ⭐ ✨ 🌷 🍓 💖 🌺 ⭐ 🦋 💫 🍑 🌸 ✨ 🌷 💖 ⭐ 🌸 ✨ 💕 🌺 🦋 🌸 💫 ✨ 🌷 💖';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    font-size: 1.8rem;
    letter-spacing: 2.8rem;
    line-height: 3.6rem;
    color: rgba(168, 115, 154, 0.15);
    word-break: break-all;
    pointer-events: none;
    z-index: 0;
    padding: 4rem 1rem;
    white-space: pre-wrap;
    overflow: hidden;
    width: 100%;
    height: 100%;
    animation: float-bg-reverse 25s ease-in-out infinite;
  }

  @keyframes float-bg-reverse {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.25; }
  }

  .desktop {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 1.5rem;
  }

  /* === WINDOW === */
  .window {
    width: 100%;
    max-width: 760px;
    height: min(540px, 80vh);
    background: var(--terminal-bg);
    border-radius: 18px;
    border: 2px solid var(--terminal-border);
    box-shadow:
      0 0 0 4px rgba(168, 115, 154, 0.08),
      0 24px 80px rgba(0, 0, 0, 0.4),
      0 8px 24px rgba(0, 0, 0, 0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: windowPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes windowPop {
    from { opacity: 0; transform: scale(0.92) translateY(16px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* === TITLE BAR === */
  .titlebar {
    background: var(--header-bg);
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    border-bottom: 2px solid var(--terminal-border);
    flex-shrink: 0;
    user-select: none;
  }

  .dots { display: flex; gap: 6px; align-items: center; }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    cursor: pointer;
    transition: filter 0.15s;
  }
  .dot:hover { filter: brightness(0.85); }
  .dot-r { background: var(--dot-red); }
  .dot-y { background: var(--dot-yellow); }
  .dot-g { background: var(--dot-green); }

  .title-text {
    flex: 1;
    text-align: center;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.85rem;
    color: var(--pink-dark);
    letter-spacing: 0.04em;
  }

  .title-icon { font-size: 1rem; }

  /* === TERMINAL BODY === */
  .terminal-body {
    flex: 1;
    overflow-y: auto;
    padding: 1.25rem 1.5rem;
    scroll-behavior: smooth;
  }

  .terminal-body::-webkit-scrollbar { width: 6px; }
  .terminal-body::-webkit-scrollbar-track { background: transparent; }
  .terminal-body::-webkit-scrollbar-thumb {
    background: var(--pink-light);
    border-radius: 99px;
  }

  /* === OUTPUT LINES === */
  .line {
    font-family: 'VT323', monospace;
    font-size: 1.2rem;
    line-height: 1.55;
    margin-bottom: 2px;
    white-space: pre-wrap;
    word-break: break-word;
    animation: lineIn 0.25s ease both;
  }

  @keyframes lineIn {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .line-prompt { color: var(--prompt-color); }
  .line-output { color: var(--output-color); padding-left: 1.2rem; }
  .line-error  { color: var(--error-color); padding-left: 1.2rem; }
  .line-success{ color: var(--success-color); padding-left: 1.2rem; }
  .line-spacer { height: 0.4rem; }
  .line-art    { color: var(--pink); padding-left: 1rem; font-size: 1.1rem; line-height: 1.4; }
  .line-info   { color: var(--lavender); padding-left: 1.2rem; font-weight: bold; }

  /* === INPUT AREA === */
  .input-area {
    border-top: 2px solid var(--terminal-border);
    background: var(--header-bg);
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-shrink: 0;
  }

  .input-prompt {
    font-family: 'VT323', monospace;
    font-size: 1.25rem;
    color: var(--prompt-color);
    white-space: nowrap;
    user-select: none;
  }

  .input-field {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'VT323', monospace;
    font-size: 1.25rem;
    color: var(--text);
    caret-color: var(--cursor-color);
  }

  .input-field::placeholder { color: var(--pink-light); }
  
  /* Mobile touch adjustments */
  @supports (padding: max(0px)) {
    .input-field {
      padding: 0 0 0 0;
    }
  }

  /* === HELP CHIPS === */
  .chips-wrap {
    padding: 0.5rem 1.5rem 0.75rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    background: var(--terminal-bg);
    border-top: 1px solid rgba(255,179,198,0.4);
    flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
  }

  .chip {
    font-family: 'VT323', monospace;
    font-size: 1rem;
    padding: 0.2rem 0.7rem;
    border-radius: 999px;
    border: 1.5px solid var(--terminal-border);
    color: var(--pink-dark);
    background: var(--header-bg);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    user-select: none;
  }
  .chip:hover { background: var(--pink-light); transform: translateY(-1px); }
  .chip:active { transform: scale(0.96); }

  /* === THEME SWITCHER === */
  .theme-btn {
    position: fixed;
    top: 1.5rem;
    right: 1.5rem;
    z-index: 200;
    background: var(--header-bg);
    border: 2px solid var(--terminal-border);
    color: var(--text);
    padding: 0.6rem 1rem;
    border-radius: 999px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    transition: all 0.2s ease;
    user-select: none;
  }
  .theme-btn:hover { 
    background: var(--pink);
    border-color: var(--pink);
    color: var(--bg);
    transform: translateY(-2px);
  }
  .theme-btn:active { transform: scale(0.98); }

  /* === BIG NAME === */
  .big-name {
    text-align: center;
    margin-bottom: 0.6rem;
    line-height: 1;
    user-select: none;
    animation: windowPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .big-name span {
    font-family: 'Bebas Neue', 'Playfair Display', sans-serif;
    font-weight: 900;
    font-size: clamp(3rem, 10vw, 5rem);
    color: var(--pink);
    text-shadow:
      0 2px 0 var(--pink-dark),
      0 3px 0 var(--pink-dark),
      0 4px 0 var(--pink-dark),
      0 6px 12px rgba(0,0,0,0.5);
    letter-spacing: 0.08em;
    display: inline-block;
    background: linear-gradient(135deg, #A8739A 0%, #C89BAB 40%, #6B4F6B 80%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 3px 8px rgba(0,0,0,0.4));
    transform: scaleY(0.95);
    font-style: normal;
  }

  .big-name .name-tag {
    display: inline-block;
    font-size: 1.1rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--header-bg) 0%, #3A3A4F 100%);
    border: 2px solid var(--pink);
    color: var(--pink);
    border-radius: 999px;
    padding: 0.2rem 1rem;
    margin-left: 0.8rem;
    vertical-align: middle;
    -webkit-text-fill-color: var(--pink);
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.06em;
  }

  /* === RESPONSIVE === */
  @media (max-width: 768px) {
    .big-name span {
      font-size: clamp(2.2rem, 8vw, 3.5rem);
    }
    
    .big-name .name-tag {
      font-size: 0.9rem;
      padding: 0.15rem 0.7rem;
      margin-left: 0.5rem;
    }
    
    .desktop { 
      padding: 0.5rem;
      padding-top: 3.5rem;
    }
    
    .window { 
      border-radius: 14px; 
      height: min(calc(100vh - 6rem), 650px);
      max-width: 100%;
    }
    
    .terminal-body { 
      padding: 0.9rem; 
      font-size: 0.95rem;
    }
    
    .terminal-body::-webkit-scrollbar { width: 4px; }
    
    .input-area { 
      padding: 0.5rem 0.75rem; 
      gap: 0.3rem;
    }
    
    .input-prompt {
      font-size: 1.1rem;
      white-space: nowrap;
    }
    
    .input-field {
      font-size: 1.1rem;
    }
    
    .chips-wrap { 
      padding: 0.4rem 0.75rem 0.5rem;
      gap: 0.35rem;
      overflow-x: auto;
      overflow-y: hidden;
      max-height: 3rem;
      flex-wrap: nowrap;
    }
    
    .chips-wrap::-webkit-scrollbar { height: 3px; }
    .chips-wrap::-webkit-scrollbar-thumb { background: var(--pink-light); border-radius: 99px; }
    
    .chip {
      font-size: 0.85rem;
      padding: 0.15rem 0.6rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
    
    .line { 
      font-size: 1rem;
      line-height: 1.4;
    }
    
    .line-output,
    .line-error,
    .line-success,
    .line-info {
      padding-left: 0.8rem;
    }
    
    .line-art {
      padding-left: 0.6rem;
      font-size: 1rem;
      line-height: 1.3;
    }
    
    .theme-btn {
      top: 0.75rem;
      right: 0.75rem;
      padding: 0.5rem 0.8rem;
      font-size: 0.8rem;
    }
  }
  
  @media (max-width: 480px) {
    .big-name {
      margin-bottom: 0.4rem;
    }
    
    .big-name span {
      font-size: clamp(1.8rem, 6vw, 2.8rem);
      text-shadow:
        0 1px 0 var(--pink-dark),
        0 2px 0 var(--pink-dark),
        0 3px 0 var(--pink-dark),
        0 4px 8px rgba(0,0,0,0.4);
    }
    
    .big-name .name-tag {
      font-size: 0.8rem;
      padding: 0.1rem 0.5rem;
      margin-left: 0.3rem;
    }
    
    .desktop {
      padding: 0.4rem;
      padding-top: 3rem;
    }
    
    .window {
      height: min(calc(100vh - 5rem), 600px);
      border: 1.5px solid var(--terminal-border);
      border-radius: 12px;
    }
    
    .titlebar {
      padding: 0.6rem 0.75rem;
    }
    
    .title-text {
      font-size: 0.75rem;
      letter-spacing: 0.02em;
    }
    
    .dots {
      gap: 4px;
    }
    
    .dot {
      width: 10px;
      height: 10px;
    }
    
    .terminal-body {
      padding: 0.75rem;
      font-size: 0.9rem;
    }
    
    .input-area {
      padding: 0.4rem 0.6rem;
      gap: 0.25rem;
    }
    
    .input-prompt {
      font-size: 0.95rem;
    }
    
    .input-field {
      font-size: 0.95rem;
    }
    
    .chips-wrap {
      padding: 0.3rem 0.6rem 0.4rem;
      gap: 0.25rem;
    }
    
    .chip {
      font-size: 0.75rem;
      padding: 0.12rem 0.5rem;
      border: 1px solid var(--terminal-border);
    }
    
    .line {
      font-size: 0.9rem;
      line-height: 1.3;
      margin-bottom: 1px;
    }
    
    .line-output,
    .line-error,
    .line-success,
    .line-info {
      padding-left: 0.6rem;
    }
    
    .line-art {
      padding-left: 0.4rem;
      font-size: 0.95rem;
      line-height: 1.2;
    }
    
    .theme-btn {
      top: 0.5rem;
      right: 0.5rem;
      padding: 0.4rem 0.7rem;
      font-size: 0.75rem;
      border: 1px solid var(--terminal-border);
    }
  }
</style>
</head>
<body>
<button class="theme-btn" id="themeBtn">🌙 Dark</button>
<div class="desktop">
  <div style="display:flex;flex-direction:column;align-items:center;width:100%;max-width:760px;">
  <div class="big-name">
    <span>SHARANYA<span class="name-tag">✨ .exe</span></span>
  </div>
  <div class="window" style="width:100%;">

    <!-- Title Bar -->
    <div class="titlebar">
      <div class="dots">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
      </div>
      <div class="title-text">✨ sharanya.exe — Portfolio Terminal v1.3 🌸</div>
      <div class="title-icon">🎀</div>
    </div>

    <!-- Terminal Output -->
    <div class="terminal-body" id="output"></div>

    <!-- Command Chips -->
    <div class="chips-wrap" id="chips">
      <span class="chip" onclick="runCommand('help')">help</span>
      <span class="chip" onclick="runCommand('whoami')">whoami</span>
      <span class="chip" onclick="runCommand('hobbies')">hobbies</span>
      <span class="chip" onclick="runCommand('projects')">projects</span>
      <span class="chip" onclick="runCommand('game')">game</span>
      <span class="chip" onclick="runCommand('fun')">fun</span>
      <span class="chip" onclick="runCommand('clear')">clear</span>
    </div>

    <!-- Input -->
    <div class="input-area">
      <span class="input-prompt">sharanya@portfolio:~$</span>
      <input
        class="input-field"
        id="cmdInput"
        type="text"
        placeholder="type a command and press Enter..."
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      />
    </div>

  </div>
  </div>
</div>

<script>
const THEMES = {
  dark: {
    name: 'Dark',
    icon: '🌙',
    colors: {
      '--bg': '#0F0F15',
      '--terminal-bg': '#1A1A24',
      '--terminal-border': '#3A3A4F',
      '--header-bg': '#252535',
      '--pink': '#A8739A',
      '--pink-dark': '#6B4F6B',
      '--pink-light': '#4A4A5F',
      '--text': '#E8E8F0',
      '--text-muted': '#A8A8B8',
      '--output-color': '#D8D8E8',
      '--error-color': '#9B6B7B',
      '--success-color': '#7B9B8B',
    }
  },
  light: {
    name: 'Light',
    icon: '☀️',
    colors: {
      '--bg': '#FFF5F7',
      '--terminal-bg': '#FFF0F3',
      '--terminal-border': '#FFB3C6',
      '--header-bg': '#FFD6E0',
      '--pink': '#FF6B9D',
      '--pink-dark': '#D64D7A',
      '--pink-light': '#FFB3C6',
      '--text': '#3D1A24',
      '--text-muted': '#9A6B78',
      '--output-color': '#3D1A24',
      '--error-color': '#D64D7A',
      '--success-color': '#5FAD8A',
    }
  },
  calm: {
    name: 'Calm Blue',
    icon: '💙',
    colors: {
      '--bg': '#0D1B2A',
      '--terminal-bg': '#1B263B',
      '--terminal-border': '#415A77',
      '--header-bg': '#2A3F5F',
      '--pink': '#7BA3C0',
      '--pink-dark': '#415A77',
      '--pink-light': '#556E8D',
      '--text': '#E0E1E6',
      '--text-muted': '#8A96AA',
      '--output-color': '#D4DFE6',
      '--error-color': '#A89B8B',
      '--success-color': '#7FB7A8',
    }
  },
  forest: {
    name: 'Forest',
    icon: '🌲',
    colors: {
      '--bg': '#0F1419',
      '--terminal-bg': '#1B2328',
      '--terminal-border': '#3D4D3F',
      '--header-bg': '#2A3530',
      '--pink': '#8BA895',
      '--pink-dark': '#556155',
      '--pink-light': '#4A5A4D',
      '--text': '#E8F0E8',
      '--text-muted': '#A8B5A8',
      '--output-color': '#D8E0D8',
      '--error-color': '#9B8B8B',
      '--success-color': '#8BA895',
    }
  }
};

let currentTheme = 'dark';

function applyTheme(themeName) {
  const theme = THEMES[themeName];
  if (!theme) return;
  
  Object.entries(theme.colors).forEach(([key, value]) => {
    document.documentElement.style.setProperty(key, value);
  });
  
  currentTheme = themeName;
  localStorage.setItem('shareanyaTheme', themeName);
  
  const btn = document.getElementById('themeBtn');
  btn.textContent = theme.icon + ' ' + theme.name;
}

function cycleTheme() {
  const themeNames = Object.keys(THEMES);
  const currentIndex = themeNames.indexOf(currentTheme);
  const nextIndex = (currentIndex + 1) % themeNames.length;
  applyTheme(themeNames[nextIndex]);
}

document.getElementById('themeBtn').addEventListener('click', cycleTheme);

// Load saved theme
const savedTheme = localStorage.getItem('shareanyaTheme') || 'dark';
applyTheme(savedTheme);

const output = document.getElementById('output');
const input  = document.getElementById('cmdInput');
let history  = [];
let histIdx  = -1;

const BOOT = [
  { t:'art', v:' _____ _                                       ' },
  { t:'art', v:'/ ____| |                                      ' },
  { t:'art', v:'| (___ | |__   __ _ _ __ __ _ _ __  _   _  __ _ ' },
  { t:'art', v:"\\___ \\| '_ \\ / _` | '__/ _` | '_ \\| | | |/ _` |" },
  { t:'art', v:'____) | | | | (_| | | | (_| | | | | |_| | (_| |' },
  { t:'art', v:'|_____/|_| |_|\\__,_|_|  \\__,_|_| |_|\\__, |\\__,_|' },
  { t:'art', v:'                                       __/ |     ' },
  { t:'art', v:'                                      |___/  🌸  ' },
  { t:'spacer' },
  { t:'output', v:'💖  Welcome to SHARANYA.EXE — cutest terminal in the USA!' },
  { t:'output', v:'🎨  Artist | ✍️  Writer | 📚  Reader | 7th Grader' },
  { t:'output', v:'🌸  Running on: Imagination OS 13.7, Cozy Edition' },
  { t:'spacer' },
  { t:'info',   v:'Type  help  to see all commands. Or just click the buttons below!' },
  { t:'spacer' },
];

const COMMANDS = {

function printLine(line, delay = 0) {
  setTimeout(() => {
    if (line.t === 'spacer') {
      const d = document.createElement('div');
      d.className = 'line line-spacer';
      output.appendChild(d);
    } else {
      const d = document.createElement('div');
      d.className = `line line-${line.t === 'art' ? 'art' : line.t === 'info' ? 'info' : line.t === 'error' ? 'error' : line.t === 'success' ? 'success' : 'output'}`;
      d.textContent = line.v || '';
      output.appendChild(d);
    }
    output.scrollTop = output.scrollHeight;
  }, delay);
}

function printLines(lines, baseDelay = 0) {
  lines.forEach((l, i) => printLine(l, baseDelay + i * 30));
  return baseDelay + lines.length * 30;
}

function runCommand(cmd) {
  const raw = cmd.trim().toLowerCase();
  if (!raw) return;

  history.unshift(raw);
  histIdx = -1;

  const promptEl = document.createElement('div');
  promptEl.className = 'line line-prompt';
  promptEl.textContent = 'sharanya@portfolio:~$ ' + cmd;
  output.appendChild(promptEl);
  output.scrollTop = output.scrollHeight;

  let lines = [];
  
  // Check if there's an active game
  if (window.shareenyaGame && !window.shareenyaGame.over) {
    const validMoves = ['rock', 'paper', 'scissors'];
    if (validMoves.includes(raw)) {
      const moves = ['rock', 'paper', 'scissors'];
      const computerMove = moves[Math.floor(Math.random() * moves.length)];
      
      let result = '';
      let playerWins = false;
      let computerWins = false;
      
      if (raw === computerMove) {
        result = "It's a tie! 🤝";
      } else if (
        (raw === 'rock' && computerMove === 'scissors') ||
        (raw === 'paper' && computerMove === 'rock') ||
        (raw === 'scissors' && computerMove === 'paper')
      ) {
        result = 'You win this round! 🎉';
        playerWins = true;
        window.shareenyaGame.score++;
      } else {
        result = 'Sharanya wins this round! 💕';
        computerWins = true;
        window.shareenyaGame.computerScore++;
      }
      
      lines = [
        { t:'output', v:'  You played: ' + raw + ' ✋' },
        { t:'output', v:'  Sharanya played: ' + computerMove + ' ✋' },
        { t:'spacer' },
        { t:playerWins ? 'success' : computerWins ? 'error' : 'output', v:'  ' + result },
        { t:'spacer' },
        { t:'info', v:'Score: You ' + window.shareenyaGame.score + ' | Sharanya ' + window.shareenyaGame.computerScore },
      ];
      
      if (window.shareenyaGame.score === 3) {
        lines.push({ t:'spacer' });
        lines.push({ t:'success', v:'🏆 YOU WON THE MATCH! Sharanya is impressed. 🏆' });
        lines.push({ t:'spacer' });
        lines.push({ t:'info', v:'Type  game  to play again! 🌸' });
        window.shareenyaGame.over = true;
      } else if (window.shareenyaGame.computerScore === 3) {
        lines.push({ t:'spacer' });
        lines.push({ t:'error', v:'Game Over! Sharanya won. Better luck next time! 💖' });
        lines.push({ t:'spacer' });
        lines.push({ t:'info', v:'Type  game  to play again! 🌸' });
        window.shareenyaGame.over = true;
      } else {
        lines.push({ t:'spacer' });
        lines.push({ t:'output', v:'Next round? Type rock, paper, or scissors! 🎯' });
      }
    } else if (raw === 'quit') {
      lines = [
        { t:'output', v:'Game quit!' },
        { t:'output', v:'Final score: You ' + window.shareenyaGame.score + ' | Sharanya ' + window.shareenyaGame.computerScore },
        { t:'spacer' },
        { t:'info', v:'Type  game  to play again! 🌸' },
      ];
      window.shareenyaGame.over = true;
    } else {
      lines = [
        { t:'error', v:'Invalid move! Type rock, paper, or scissors. (Or quit to stop.)' },
      ];
    }
  } else if (COMMANDS[raw]) {
    const result = COMMANDS[raw]();
    if (Array.isArray(result)) lines = result;
  } else if (EASTER_EGGS[raw]) {
    lines = EASTER_EGGS[raw];
  } else {
    lines = [
      { t:'error',  v:`Command not found: "${raw}" 💀` },
      { t:'output', v:'Hmm. Did you make that up? Because she respects that. Very creative.' },
      { t:'output', v:'Unfortunately it does nothing. Type  help  to see things that do. 🌸' },
      { t:'output', v:'(But also try typing  pizza  or  potato. Just saying.)' },
    ];
  }

  printLines(lines, 50);
  if (raw !== 'clear') {
    setTimeout(() => { const s = document.createElement('div'); s.className = 'line line-spacer'; output.appendChild(s); }, 50 + lines.length * 30);
  }
  input.value = '';
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    runCommand(input.value);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < history.length - 1) { histIdx++; input.value = history[histIdx]; }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; input.value = history[histIdx]; }
    else { histIdx = -1; input.value = ''; }
  }
});

// Boot sequence
window.addEventListener('load', () => {
  let delay = 0;
  BOOT.forEach((l, i) => {
    delay = i * 35;
    printLine(l, delay);
  });
  setTimeout(() => input.focus(), delay + 200);
});

input.addEventListener('focus', () => {}, true);
document.querySelector('.window').addEventListener('click', () => input.focus());
